<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML, CSS, and Quiz terms</title>
    <meta name="description" content="This is a page to see an example of the uses of tables with a simple quiz made with html and css. It is a quiz page.">
    <meta name="author" content="Edrei Barajas">
    <link rel="stylesheet" href="styles/quiz.css">
</head>
<body>
    <h1>Basic HTML and CSS Quiz</h1>
    <form id="quiz-form" action="submit_quiz.php" method="post">
        <label for="q1">1.What does the acronym CSS stand for? </label>
        <input type="text" name="q1" id="q1"/>

        <br><br>

        <label for="q2">2. How are id and class attributes selected in CSS?</label>
        <textarea name="q2" id="q2" rows="4" cols="20"></textarea>

        <br><br>

        <label for="q3">3.Which of the following is a valid CSS comment?</label>
        <select name="q3" id="q3">
            <option value="" selected disabled>Choose One ...</option>
            <option value="comment">/* This is a comment */</option>
            <option value="wrong">This is a comment</option>
            <option value="wrong">/ This is a comment /</option>
            <option value="wrong">* This is a comment *</option>
        </select>

        <br><br>

        <label for="q4">4.What is the bottom margin given this declaration?</label>
        <img src="images/question_4.png" alt="Margin example"> 
        <input type="number" name="q4" id="q4" />

        <br><br>

        <div class="submit">
        <button type="submit">Submit Quiz</button>
        </div>

    </form>
    
</body>
</html>
